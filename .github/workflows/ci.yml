name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install Dependencies
        run: uv sync

      - name: Ruff Check
        id: ruff-check
        run: uv run ruff check pykorf tests
        continue-on-error: true

      - name: Ruff Format Check
        id: ruff-format
        run: uv run ruff format --check pykorf tests
        continue-on-error: true

      - name: Mypy Static Analysis
        id: mypy
        run: uv run mypy pykorf
        continue-on-error: true

      - name: Run Tests
        id: pytest
        run: uv run pytest -m "not automation"
        continue-on-error: true

      - name: Report Results
        run: |
          echo "## Quality Check Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Ruff Check | ${{ steps.ruff-check.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Ruff Format | ${{ steps.ruff-format.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mypy | ${{ steps.mypy.outcome == 'success' && '✅ Passed' || '⚠️ Warning' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tests | ${{ steps.pytest.outcome == 'success' && '✅ Passed' || '❌ Failed' }} |" >> $GITHUB_STEP_SUMMARY

      - name: Fail if any check failed
        if: steps.ruff-check.outcome == 'failure' || steps.ruff-format.outcome == 'failure' || steps.pytest.outcome == 'failure'
        run: |
          echo "One or more quality checks failed. See above for details."
          exit 1
