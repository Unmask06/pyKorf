name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Install Dependencies
        run: uv sync

      - name: Ruff Check & Format
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: Mypy Static Analysis
        run: uv run mypy .

      - name: Run Tests
        run: uv run pytest -m "not automation"
