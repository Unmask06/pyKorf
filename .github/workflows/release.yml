name: Release Windows Build

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Necessary to check existing tags

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install

      - name: Get Version
        id: get_version
        shell: pwsh
        run: |
          $VERSION = uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml', 'rb'))['project']['version'])"
          $MAJOR = $VERSION.Split('.')[0]
          echo "VERSION=$VERSION" >> $env:GITHUB_OUTPUT
          echo "MAJOR=$MAJOR" >> $env:GITHUB_OUTPUT
          echo "Target version: $VERSION (major: $MAJOR)"

      - name: Check if Tag Exists
        id: check_tag
        shell: pwsh
        run: |
          $TAG = "v${{ steps.get_version.outputs.VERSION }}"
          if (git tag -l $TAG) {
            echo "EXISTS=true" >> $env:GITHUB_OUTPUT
            echo "::warning ::Tag $TAG already exists. Skipping build and release steps to avoid failure."
          } else {
            echo "EXISTS=false" >> $env:GITHUB_OUTPUT
          }

      - name: Install Dependencies
        if: steps.check_tag.outputs.EXISTS == 'false'
        run: uv sync

      - name: Build Distribution
        if: steps.check_tag.outputs.EXISTS == 'false'
        run: .\distribute.bat

      - name: Create Release
        if: steps.check_tag.outputs.EXISTS == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.VERSION }}
          name: pyKorf v${{ steps.get_version.outputs.VERSION }}
          body: |
            ## pyKorf Windows Distribution

            This is an automated release of the pyKorf Windows build.

            ### How to Get pyKorf
            Download `pykorf.bat` from the assets below (only needed once —
            or when a new major version is released).

            Run `pykorf.bat` — it downloads and installs pyKorf automatically on first run.
            Subsequent updates are handled automatically from within the application.
          draft: false
          prerelease: false
          files: |
            dist/pykorf-v${{ steps.get_version.outputs.MAJOR }}.zip
            dist/pykorf-v${{ steps.get_version.outputs.MAJOR }}.zip.sha256
            dist/pykorf.bat
            dist/bat_version.txt
          generate_release_notes: true
