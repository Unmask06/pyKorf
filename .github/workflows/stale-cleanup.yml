name: Stale Issue/PR Cleanup

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: |
            This issue has been automatically marked as stale due to 30 days of inactivity.
            It will be closed in 7 days if no further activity occurs.
            Comment to keep this issue open.
          stale-pr-message: |
            This PR has been automatically marked as stale due to 30 days of inactivity.
            It will be closed in 7 days if no further activity occurs.
            Push a commit or comment to keep this PR open.
          close-issue-message: |
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          close-pr-message: |
            Closed due to inactivity. Feel free to reopen if this is still relevant.
          days-before-stale: 30
          days-before-close: 7
          stale-issue-label: stale
          stale-pr-label: stale
          exempt-issue-labels: pinned,security,enhancement
          exempt-pr-labels: pinned,security
          exempt-all-milestones: true
          operations-per-run: 100
