name: Create Issue on Workflow Failure

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  create-issue:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      actions: read
    steps:
      - name: Download quality report
        id: download
        uses: actions/download-artifact@v4
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
          name: quality-report
          path: reports/

      - name: Create issue on failure
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            const workflowName = `${{ github.event.workflow_run.name }}`;
            const workflowUrl = `${{ github.event.workflow_run.html_url }}`;
            const headBranch = `${{ github.event.workflow_run.head_branch }}`;
            const headSha = `${{ github.event.workflow_run.head_sha }}`;
            const runAttempt = `${{ github.event.workflow_run.run_attempt }}`;

            let reportDetails = '';
            try {
              const reportPath = path.join('reports', 'quality-report.json');
              const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
              const statusEmoji = {
                'success': '✅ Passed',
                'failure': '❌ Failed',
                'skipped': '⏭️ Skipped'
              };
              reportDetails = `
            | Check | Status |
            |-------|--------|
            | Ruff Check | ${statusEmoji[report.ruff_check] || report.ruff_check} |
            | Ruff Format | ${statusEmoji[report.ruff_format] || report.ruff_format} |
            | Mypy | ${statusEmoji[report.mypy] || report.mypy} |
            | Tests | ${statusEmoji[report.pytest] || report.pytest} |
            `;
            } catch (e) {
              reportDetails = '*Quality report not available.*';
            }

            const issueTitle = `Workflow Failed: ${workflowName}`;

            const issueBody = `/oc

## Workflow Failure Report

**Workflow:** [${workflowName}](${workflowUrl})
**Branch:** \`${headBranch}\`
**Commit:** \`${headSha}\`
**Run Attempt:** ${runAttempt}

### Failure Details

${reportDetails}

### Implementation Plan Required

Analyze the failure logs and codebase, then:

1. **Root Cause Analysis** — Identify exactly which check failed and why
2. **Fix Plan** — Outline specific file changes needed
3. **Implement** — Apply the fix
4. **Verify** — Run the relevant checks locally to confirm
5. **Commit** — Create a fix commit referencing this issue

---

*This issue was automatically created by the issue-on-failure workflow.*
`;

            const { data: issue } = await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: issueTitle,
              body: issueBody,
              labels: ['bug', 'ci-failure', 'automated']
            });

            console.log(`Created issue #${issue.number}: ${issueTitle}`);

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body: `/oc

Analyze this CI failure and implement a fix. Review the workflow logs, identify the root cause, and create a PR with the fix.`
            });

            console.log(`Added opencode trigger comment to issue #${issue.number}`);
