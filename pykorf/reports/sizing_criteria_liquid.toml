# Line Sizing Criteria for Liquid — Table 14-3
# Source: Engineering Design Criteria
#
# Units
#   velocity  : m/s
#   dp        : kPa/100m  (source table is bar/100m; values multiplied × 100)
#   line_size : inch (nominal); 9999 = no upper limit (≥ N")
#   pressure  : barg; 9999 = no upper pressure limit
#
# Lookup: filter by code
#   → if multiple sizes : sort by line_size → first entry where pipe_size ≤ line_size
#   → if multiple press : sort by pressure  → first entry where op_pressure ≤ pressure
# Range format
#   vel = [min, max]     velocity range in m/s
#   dp  = [normal, max]  pressure drop range in kPa/100m
# Missing dp (0.0) = no criterion specified in source table

fluid_type     = "liquid"
dp_unit        = "kPa/100m"
velocity_unit  = "m/s"
line_size_unit = "inch"
pressure_unit  = "barg"

