rho_v2 = 0

[[criteria]]
code      = "CMP-ASL"
service   = "Compressor Anti Surge Line"
notes     = "Note 3 — max velocity < 1/3 sonic velocity"
vel    = [0.0, 0.0]   # governed by Note 3 (1/3 sonic)
dp     = [0.0, 0.0]
rho_v2 = 25000

# ---------------------------------------------------------------------------
# Tower Overhead & Vacuum Service
# ---------------------------------------------------------------------------

[[criteria]]
code      = "TWR-OH"
service   = "Tower Overhead"
notes     = "Note 4 — sized for available pressure drop"
vel    = [0.0, 0.0]
dp     = [2.3, 11.0]  # 0.023 / 0.11 bar/100m
rho_v2 = 0

[[criteria]]
code      = "VAC-SVC"
