notes     = "Note 2 — velocity from rho_v2"
vel    = [0.0, 0.0]
dp     = [2.0, 7.0]  # 0.02 / 0.07 bar/100m
rho_v2 = 3000

[[criteria]]
code      = "CMP-SUC-CEN"
service   = "Compressor Suction — Centrifugal"
notes     = "Note 2 — velocity from rho_v2"
vel    = [0.0, 0.0]
dp     = [2.0, 7.0]  # 0.02 / 0.07 bar/100m
rho_v2 = 6000

