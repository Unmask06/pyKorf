# Line Sizing Criteria for Gases & Steam — Table 14-4
# Source: Engineering Design Criteria
#
# Units
#   velocity  : m/s
#   dp        : kPa/100m  (source table is bar/100m; values multiplied × 100)
#   pressure  : barg; omit = no upper pressure limit (catch-all row)
#   line_size : inch (nominal); omit = no upper size limit (catch-all row)
#   rho_v2    : kg/(m·s²)  — momentum criterion: ρV² ≤ this value
#               0 = not specified in source table
#
# Lookup (pressure-based services):
#   filter by code → sort by pressure → first entry where op_pressure ≤ pressure
#   → single-entry codes: omit pressure entirely (always matches)
#
# Lookup (size-based services):
#   filter by code → sort by line_size → first entry where pipe_size ≤ line_size
#   → single-entry codes: omit line_size entirely (always matches)
#
# vel = [min, max]    max = 0.0 → no max velocity criterion (governed by rho_v2 or Note)
# dp  = [normal, max] max = 0.0 → no dP criterion specified in source table
#
# Notes from source table
#   Note 1: Gases, General — see also Note 8 (noise)
#   Note 2: Max velocity determined from rho_v2 using vapour density at operating conditions
#   Note 3: Max velocity < (1/3 × Sonic Velocity)
#   Note 4: Sized based on available pressure drop
#   Note 5: Sized for available pressure drop; max velocity < (1/3 × Sonic Velocity)
#   Note 6: Vacuum exhaust — ~0.017 bar total line loss, max velocity 140 m/s
#   Note 7: Apply dP criteria based on user requirements and distance from pressure source
#   Note 8: Flowing velocity effects on noise to be considered in addition to above

fluid_type     = "gas"
dp_unit        = "kPa/100m"
velocity_unit  = "m/s"
pressure_unit  = "barg"
line_size_unit = "inch"
rho_v2_unit    = "kg/(m.s2)"

# ---------------------------------------------------------------------------
# Gases, General  (Note 1, 2, 8)
# Velocity governed by rho_v2 — see Note 2
# Pressure breakpoints: < 20 | 20–50 | 50–80 | > 80 barg
# ---------------------------------------------------------------------------

[[criteria]]
code      = "GAS-GEN"
service   = "Gases, General"
notes     = "Note 1, 2, 8 — velocity from rho_v2"
pressure  = 20       # P < 20 barg
vel    = [0.0, 0.0]  # determined by rho_v2
dp     = [0.0, 0.0]  # no dP criterion
rho_v2 = 15000

[[criteria]]
code      = "GAS-GEN"
service   = "Gases, General"
notes     = "Note 1, 2, 8 — velocity from rho_v2"
pressure  = 50       # 20 < P ≤ 50 barg
vel    = [0.0, 0.0]
dp     = [0.0, 0.0]
rho_v2 = 15000

[[criteria]]
code      = "GAS-GEN"
service   = "Gases, General"
notes     = "Note 1, 2, 8 — velocity from rho_v2"
pressure  = 80       # 50 < P ≤ 80 barg
vel    = [0.0, 0.0]
dp     = [0.0, 0.0]
rho_v2 = 15000

[[criteria]]
code      = "GAS-GEN"
service   = "Gases, General"
notes     = "Note 1, 2, 8 — velocity from rho_v2"
# no pressure → catch-all (P > 80 barg)
vel    = [0.0, 0.0]
dp     = [0.0, 0.0]
rho_v2 = 15000

