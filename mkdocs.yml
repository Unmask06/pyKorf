site_name: pyKorf
site_description: Enterprise Python toolkit for KORF hydraulic model files
site_url: https://pykorf.readthedocs.io
repo_name: pykorf/pykorf
repo_url: https://github.com/pykorf/pykorf
copyright: Copyright &copy; 2024 pyKorf Contributors

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/favicon.png
  features:
    # - announce.dismiss  # Disabled to suppress April Fools notice
    - content.action.edit
    - content.action.view
    - content.code.annotate
    - content.code.copy
    - content.tabs.link
    - content.tooltips
    - header.autohide
    - navigation.expand
    - navigation.footer
    - navigation.indexes
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.path
    - navigation.prune
    - navigation.sections
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Roboto
    code: Roboto Mono

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/pykorf/pykorf
    - icon: fontawesome/brands/python
      link: https://pypi.org/project/pykorf/

plugins:
  - search
  # - social  # Disabled: requires mkdocs-material[imaging]
  - mkdocstrings:
      handlers:
        python:
          paths: [pykorf]
          options:
            docstring_style: google
            docstring_options:
              ignore_init_summary: true
            merge_init_into_class: true
            show_docstring_attributes: true
            show_docstring_examples: true
            show_docstring_other_parameters: true
            show_docstring_parameters: true
            show_docstring_raises: true
            show_docstring_returns: true
            show_docstring_warns: true
            show_docstring_yields: true
            show_if_no_docstring: false
            show_inheritance_diagram: true
            show_inheritance: true
            show_root_heading: true
            show_root_full_path: true
            show_root_members_full_path: false
            show_object_full_path: false
            show_signature: true
            show_signature_annotations: true
            show_source: true
            separate_signature: true
            signature_crossrefs: true
            line_length: 80
          import:
            - https://docs.python.org/3/objects.inv
  - minify:
      minify_html: true
  # - git-revision-date-localized:
  #     enable_creation_date: true  # Disabled: requires git history

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: On this page
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      repo_url_shorthand: true
      user: pykorf
      repo: pykorf
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets:
      auto_append:
        - includes/abbreviations.md
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

validation:
  omitted_files: warn
  absolute_links: warn
  unrecognized_links: warn

exclude_docs: |
  CHANGES_SUMMARY.md
  ENTERPRISE_API.md
  FLUID_CLASS.md
  PMS_AND_FLUID_WORKFLOW.md
  includes/abbreviations.md
  README.md

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quick Start: getting-started/quickstart.md
    - Concepts: getting-started/concepts.md
  - User Guide:
    - Loading Models: user-guide/loading-models.md
    - Working with Elements: user-guide/working-with-elements.md
    - Multi-Case Analysis: user-guide/multi-case-analysis.md
    - Connectivity: user-guide/connectivity.md
    - Validation: user-guide/validation.md
    - Export & Import: user-guide/export-import.md
  - API Reference:
    - Overview: api/overview.md
    - Model: api/model.md
    - Elements: api/elements.md
  - CLI Reference:
    - Overview: cli/overview.md
    - Commands: cli/commands.md
  - Development:
    - Contributing: development/contributing.md
    - Changelog: development/changelog.md
  - About:
    - License: about/license.md
